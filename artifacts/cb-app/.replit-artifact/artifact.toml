kind = "web"
previewPath = "/"
title = "CB — NYC Civic Narrative"
version = "1.0.0"
id = "artifacts/cb-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24396

[services.development]
run = "pnpm --filter @workspace/cb-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cb-app", "run", "build" ]
publicDir = "artifacts/cb-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24396"
BASE_PATH = "/"
